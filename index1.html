<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdf2f8; /* Soft pink background */
            color: #333;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #ec4899; /* Bright pink text */
            font-size: 3em;
            margin-bottom: 15px;
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
            color: #555;
        }
        .video-container {
            margin: 30px 0;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Happy Birthday! 🎂</h1>
        <p>Wishing you the most amazing day filled with joy, laughter, and cake! I put together this special video message just for you.</p>
        
        <div class="video-container">
            <!-- IMPORTANT: Make sure your video file is named exactly this, or change the text below to match your file -->
            <video controls>
                <source src="birthday-video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <p>With lots of love, <br><strong>[Your Name]</strong></p>
    </div>
</body>
</html>
